services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: trebol_db
      POSTGRES_USER: trebol
      POSTGRES_PASSWORD: ${DB_PASSWORD:-trebol_secret_2024}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trebol -d trebol_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
