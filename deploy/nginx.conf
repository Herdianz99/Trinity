# Trinity ERP — Nginx configuration
# Domain: eltrebol.app | API: api.eltrebol.app
# Server IP: 134.209.220.233

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

# ─── Frontend: eltrebol.app → localhost:3000 (Next.js) ───────────────

server {
    listen 80;
    server_name eltrebol.app www.eltrebol.app;

    # Certbot will add SSL redirect here
    location / {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl http2;
    server_name eltrebol.app www.eltrebol.app;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/eltrebol.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eltrebol.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (Next.js HMR in dev, but good practice)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}

# ─── API: api.eltrebol.app → localhost:4000 (NestJS) ─────────────────

server {
    listen 80;
    server_name api.eltrebol.app;

    location / {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl http2;
    server_name api.eltrebol.app;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/api.eltrebol.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.eltrebol.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Allow large file uploads (invoice photos, product imports)
    client_max_body_size 20M;

    # Rate limiting
    limit_req zone=api burst=40 nodelay;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (longer for API operations like imports)
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Health check endpoint (no rate limit)
    location /health {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        limit_req off;
    }
}
